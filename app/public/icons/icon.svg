<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Linear Gradients -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff00" />
      <stop offset="50%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#ff5500" />
    </linearGradient>
  </defs>

  <!-- Transparent Background (For standard icon) -->
  
  <!-- Outer Compass/Radar Circle -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#neon-grad)" stroke-width="20" stroke-dasharray="10, 15" opacity="0.85" filter="url(#neon-glow)" />

  <!-- Inner Compass/Radar Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#00ff00" stroke-width="4" opacity="0.4" />

  <!-- Winding Road Graphic -->
  <path d="M 120 400 C 120 280, 240 280, 240 200 C 240 140, 160 140, 160 100" fill="none" stroke="#ff5500" stroke-width="28" stroke-linecap="round" filter="url(#neon-glow)" />
  <path d="M 392 400 C 392 280, 272 280, 272 200 C 272 140, 352 140, 352 100" fill="none" stroke="#00ff00" stroke-width="28" stroke-linecap="round" filter="url(#neon-glow)" />
  
  <!-- Center Arrow / Compass Needle -->
  <polygon points="256,120 286,210 256,190 226,210" fill="#00ff00" filter="url(#neon-glow)" />
  <polygon points="256,392 286,302 256,322 226,302" fill="#ff5500" filter="url(#neon-glow)" />
  
  <!-- Central Glowing Hub -->
  <circle cx="256" cy="256" r="24" fill="#121212" stroke="url(#neon-grad)" stroke-width="6" filter="url(#neon-glow)" />
</svg>
